<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZiSi. - intuitive investing.</title>
  <link rel="icon" type="image/png" href="/zisi_desktop_icon.png" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48dGV4dCB5PSI3NSIgeD0iNTAiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGZvbnQtZmFtaWx5PSJPdXRmaXQsSW50ZXIsc2Fucy1zZXJpZiIgZm9udC13ZWlnaHQ9IjkwMCIgZm9udC1zaXplPSI3NSIgZmlsbD0iI2M1OWIyNyI+Wi48L3RleHQ+PC9zdmc+" />
  <link rel="apple-touch-icon" href="/zisi_desktop_icon.png" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="description" content="ZiSi. - Intelligent prediction market trading dashboard" />
  <meta name="theme-color" content="#08080a" />
  <style>
    html, body {
      background-color: #08080a !important;
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
    }
    
    .initial-loading-overlay {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at center, rgba(197, 155, 39, 0.08) 0%, #08080a 80%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    
    .loading-content {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
    .premium-logo-glow-wrapper {
      position: relative;
      margin-bottom: 8px;
    }
    
    .premium-logo-text {
      font-family: system-ui, -apple-system, sans-serif;
      font-weight: 900;
      font-size: 56px;
      letter-spacing: -0.05em;
      color: #ffffff;
      margin: 0;
      background: linear-gradient(135deg, #ffffff 30%, #c59b27 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: logoScaleReveal 0.4s cubic-bezier(0.25, 1, 0.5, 1) forwards;
      filter: drop-shadow(0 0 15px rgba(197, 155, 39, 0.3));
    }
    
    .premium-logo-glow {
      position: absolute;
      inset: -10px;
      background: radial-gradient(circle, rgba(197, 155, 39, 0.25) 0%, transparent 70%);
      filter: blur(8px);
      z-index: -1;
      animation: logoPulse 1.2s ease-in-out infinite alternate;
    }
    
    .premium-subtitle-text {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: #a1a1aa;
      letter-spacing: 0.15em;
      text-transform: lowercase;
      margin: 4px 0 24px 0;
      opacity: 0;
      animation: fadeInSubtitle 0.3s ease-out 0.15s forwards;
    }
    
    .premium-loader-line {
      width: 140px;
      height: 2px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 99px;
      overflow: hidden;
      position: relative;
    }
    
    .premium-loader-sweep {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 100%;
      background: linear-gradient(90deg, transparent, #c59b27, transparent);
      animation: loaderSweep 0.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
    }
    
    @keyframes logoScaleReveal {
      0% { transform: scale(0.92); opacity: 0; filter: blur(8px); }
      100% { transform: scale(1); opacity: 1; filter: blur(0); }
    }
    
    @keyframes logoPulse {
      0% { transform: scale(0.95); opacity: 0.5; }
      100% { transform: scale(1.05); opacity: 0.8; }
    }
    
    @keyframes fadeInSubtitle {
      0% { opacity: 0; transform: translateY(4px); }
      100% { opacity: 0.85; transform: translateY(0); }
    }
    
    @keyframes loaderSweep {
      0% { transform: translateX(-100%); }
      50% { transform: translateX(-20%); }
      100% { transform: translateX(100%); }
    }
  </style>
</head>
<body>
  <div id="root">
    <!-- Static Loading Screen to display instantly while JS downloads -->
    <div class="initial-loading-overlay">
      <div class="loading-content">
        <div class="premium-logo-glow-wrapper">
          <h1 class="premium-logo-text">ZiSi.</h1>
          <div class="premium-logo-glow"></div>
        </div>
        <p class="premium-subtitle-text">intuitive investing.</p>
        <div class="premium-loader-line">
          <div class="premium-loader-sweep"></div>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
