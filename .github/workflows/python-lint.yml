name: Python Lint & Syntax Check

on:
  push:
    branches: [ main ]
    paths:
      - '**.py'
      - '.github/workflows/python-lint.yml'
  pull_request:
    branches: [ main ]
    paths:
      - '**.py'

jobs:
  lint:
    name: Syntax check all Python files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install runtime deps (for import-level checks)
        run: |
          pip install requests python-dotenv

      - name: AST syntax check — all .py files
        run: |
          python - <<'EOF'
          import ast, pathlib, sys

          SKIP = {'venv', '.venv', 'env', '__pycache__', 'node_modules', 'build', 'dist'}

          errors = []
          checked = 0

          for f in pathlib.Path('.').rglob('*.py'):
              if any(part in SKIP for part in f.parts):
                  continue
              try:
                  ast.parse(f.read_text(encoding='utf-8'))
                  checked += 1
              except SyntaxError as e:
                  errors.append(f'{f}: line {e.lineno}: {e.msg}')

          print(f'Checked {checked} Python files.')
          if errors:
              print('\nSyntax errors found:')
              for e in errors:
                  print(' ', e)
              sys.exit(1)
          else:
              print('All files OK.')
          EOF

      - name: Check for obvious secrets in .py files
        run: |
          # Fail if any .py file hard-codes obvious API key patterns
          # (env var reads are fine — raw string literals are not)
          python - <<'EOF'
          import re, pathlib, sys

          SKIP = {'venv', '.venv', 'env', '__pycache__', 'node_modules'}
          # Pattern: assignment of a long alphanumeric literal that looks like a key
          PATTERN = re.compile(r'''(?i)(api_key|secret|token|private_key)\s*=\s*['"][A-Za-z0-9+/]{32,}['"]''')

          hits = []
          for f in pathlib.Path('.').rglob('*.py'):
              if any(p in SKIP for p in f.parts):
                  continue
              text = f.read_text(encoding='utf-8', errors='ignore')
              for ln, line in enumerate(text.splitlines(), 1):
                  if PATTERN.search(line) and 'os.getenv' not in line and 'environ' not in line:
                      hits.append(f'{f}:{ln}: {line.strip()[:80]}')

          if hits:
              print('Potential hardcoded secrets detected:')
              for h in hits:
                  print(' ', h)
              sys.exit(1)
          else:
              print('No hardcoded secrets found.')
          EOF
