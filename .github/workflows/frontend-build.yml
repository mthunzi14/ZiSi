name: Frontend Build

on:
  push:
    branches: [ main ]
    paths:
      - 'dashboard/frontend/**'
      - '.github/workflows/frontend-build.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'dashboard/frontend/**'

jobs:
  build:
    name: Vite production build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: dashboard/frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Report bundle size
        run: |
          echo "--- Build output ---"
          du -sh dist/
          find dist/assets -type f | sort | while read f; do
            size=$(du -sh "$f" | cut -f1)
            echo "  $size  $f"
          done

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dashboard/frontend/dist/
          retention-days: 7
